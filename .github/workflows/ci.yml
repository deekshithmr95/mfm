name: CI — Shared + Web + Mobile

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────
  # Step 1: Install & cache monorepo dependencies
  # ─────────────────────────────────────────────────────────
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            frontend/node_modules
            mobile-app/node_modules
          key: deps-${{ hashFiles('package-lock.json') }}

  # ─────────────────────────────────────────────────────────
  # Step 2: Lint & type-check all workspaces
  # ─────────────────────────────────────────────────────────
  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            frontend/node_modules
            mobile-app/node_modules
          key: deps-${{ hashFiles('package-lock.json') }}
      - name: Lint frontend
        run: npm run lint --workspace=frontend --if-present

  # ─────────────────────────────────────────────────────────
  # Step 3: Build web frontend
  # ─────────────────────────────────────────────────────────
  build-web:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            frontend/node_modules
            mobile-app/node_modules
          key: deps-${{ hashFiles('package-lock.json') }}
      - name: Build Next.js
        run: npm run build --workspace=frontend
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: frontend/.next
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  # Step 4: Run frontend tests
  # ─────────────────────────────────────────────────────────
  test-web:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            frontend/node_modules
            mobile-app/node_modules
          key: deps-${{ hashFiles('package-lock.json') }}
      - name: Run Jest tests
        run: npm test --workspace=frontend --if-present

  # ─────────────────────────────────────────────────────────
  # Step 5: Build Go backend
  # ─────────────────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go mod tidy
      - run: go build -ldflags="-s -w" -o bin/bootstrap cmd/api/main.go
        env:
          GOARCH: arm64
          GOOS: linux
      - run: go test ./... -v

  # ─────────────────────────────────────────────────────────
  # Step 6: Deploy (only on main branch push)
  # ─────────────────────────────────────────────────────────
  deploy-backend:
    needs: [build-backend, build-web]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g serverless
      - run: go build -ldflags="-s -w" -o bin/bootstrap cmd/api/main.go
        env:
          GOARCH: arm64
          GOOS: linux
      - run: sls deploy --stage production --verbose
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
