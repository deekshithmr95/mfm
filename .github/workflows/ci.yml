name: CI — Shared + Web + Mobile

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────
  # Step 1: Install & cache monorepo dependencies
  # ─────────────────────────────────────────────────────────
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            frontend/node_modules
            mobile-app/node_modules
          key: deps-${{ hashFiles('package-lock.json') }}

  # ─────────────────────────────────────────────────────────
  # Step 2: Lint & type-check all workspaces
  # ─────────────────────────────────────────────────────────
  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            frontend/node_modules
            mobile-app/node_modules
          key: deps-${{ hashFiles('package-lock.json') }}
      - name: Lint frontend
        run: npm run lint --workspace=frontend --if-present

  # ─────────────────────────────────────────────────────────
  # Step 3: Build web frontend
  # ─────────────────────────────────────────────────────────
  build-web:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            frontend/node_modules
            mobile-app/node_modules
          key: deps-${{ hashFiles('package-lock.json') }}
      - name: Build Next.js
        run: npm run build --workspace=frontend

  # ─────────────────────────────────────────────────────────
  # Step 4: Run frontend tests
  # ─────────────────────────────────────────────────────────
  test-web:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            frontend/node_modules
            mobile-app/node_modules
          key: deps-${{ hashFiles('package-lock.json') }}
      - name: Run Jest tests
        run: npm test --workspace=frontend --if-present

  # ─────────────────────────────────────────────────────────
  # Step 5: Build Go backend
  # ─────────────────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go mod tidy
      - run: go build -ldflags="-s -w" -o bin/bootstrap cmd/api/main.go
        env:
          GOARCH: arm64
          GOOS: linux
      - run: go test ./... -v

  # ─────────────────────────────────────────────────────────
  # Step 6: Deploy to GCP (only on main branch push)
  # ─────────────────────────────────────────────────────────
  deploy:
    needs: [build-backend, build-web]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Dependencies
        run: npm ci

      - name: Fix Firebase Next.js binary issue
        run: npm install next@16.2.2 --no-save --no-package-lock
        working-directory: frontend

      - name: Install Firebase CLI
        run: npm install -g firebase-tools
        
      - name: Enable GCP APIs
        run: |
          gcloud services enable \
            cloudfunctions.googleapis.com \
            cloudbuild.googleapis.com \
            run.googleapis.com \
            artifactregistry.googleapis.com \
            cloudresourcemanager.googleapis.com \
            cloudbilling.googleapis.com \
            --project mysore-farmer-market

      - name: Deploy Frontend to Firebase Hosting
        run: |
          firebase experiments:enable webframeworks
          find . -name "package-lock.json" -type f -delete
          firebase deploy --only hosting --project mysore-farmer-market --debug --force
        
      - name: Deploy Backend to Cloud Functions
        working-directory: backend
        run: bash scripts/deploy.sh
